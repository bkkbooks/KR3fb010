body:
  text: 食甚日躔黃道翼八度五十一分赤道翼八度三十九分依舊法算距至元辛巳歲一千四百一十四年日食九分六十三秒初虧午正三刻正西食甚未正初刻復圓申初二刻正東食甚日躔黃道翼六度五十二分赤道翼六度四十一分漢武帝征和四年八月辛酉晦日有食之不盡如鉤在亢二度晡時食從西北日下晡時復同上依新法算距嘉靖甲寅歲一千六百四十二年距萬曆辛巳歲一千六百六十九年日食九分八十五秒初虧未初二刻西北食甚未正三刻正北復圓申正初刻東北食甚日躔黃道角十一度七十八分赤道角十度八十五分依舊法算距至元辛巳歲一千三百六十九年日食九分四十三秒初虧未正初刻正西食甚申初一刻復圓申正二刻正東
