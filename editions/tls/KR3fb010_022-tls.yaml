body:
  text: 距淳熙三年丙申歲至萬曆二十二年甲午歲四百一十八年以其法推淳熙三年天正冬至得戊申及推萬曆二十二年天正冬至得庚辰後天一日以新法上考淳熙三年天正冬至得戊申與淳熙曆合大明曆金世宗時趙知微重修乙未曆金世宗時耶律履造命日起壬申二曆並以大定二十年庚子歲爲距至萬曆二十二年甲午歲四百一十四年以其法推大定二十年天正冬至得己巳及推萬曆二十二年天正冬至得庚辰後天一日以新法上考大定二十年天正冬至得己巳與大明曆合會元曆宋光宗時劉孝榮重造距紹熙二年辛亥歲至萬曆二十二年甲午歲四百三年以其法推紹熙二年天正冬至得丁卯及推萬曆二十二年天正冬至得庚辰後天一日以新法上考紹熙二年天正冬至得丁卯與會元曆合統天曆宋寧宗時楊忠輔造距慶元五年己未歲至萬曆二十二年甲午歲三百九十五年以其法推慶元五年天正冬至得己酉日十六刻及推萬曆二十二年天正冬至得己卯日七十八刻先新法八刻以新法上考慶元五年天正冬至得己酉日十六刻與統天曆合開禧曆宋寧宗時鮑澣之造距開禧三年丁卯歲至萬曆二十二年甲午歲三百八十七年以其法推開禧三年天正冬至得辛卯及推萬曆二十二年天正冬至得庚辰後天一日以新法上考開禧三年天正冬至得
