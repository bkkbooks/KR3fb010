body:
  text: 距仁壽四年甲子歲至萬曆二十二年甲午歲九百九十年以其法推仁壽四年天正冬至得己酉及推萬曆二十二年天正冬至得辛巳後天二日以新法上考仁壽四年天正冬至得己酉與皇極曆合大業曆隋文帝時張胄玄造煬帝時重定距大業四年戊辰歲至萬曆二十二年甲午歲九百八十六年以其法推大業四年天正冬至得辛未及推萬曆二十二年天正冬至得庚辰後天一日以大衍曆上考大業四年天正冬至得庚午新法與大衍同戊寅曆唐高祖時傅仁均造距武德九年丙戌歲至萬曆二十二年甲午歲九百六十八年以其法推武德九年天正冬至得乙巳及推萬曆二十二年天正冬至得壬午後天三日以大衍曆上考武德九年天正冬至得甲辰新法與大衍同麟德曆唐高宗時李淳風造距麟德元年甲子歲至萬曆二十二年甲午歲九百三十年以其法推麟德元年天正冬至得甲子及推萬曆二十二年天正冬至得辛巳後天二日以新法上考麟德元年天正冬至得甲子與麟德曆合神龍曆唐中宗時南宫説等造距神龍元年乙巳歲至萬曆二十二年甲午歲八百八十九年以其法推神龍元年天正冬至得己亥及推萬曆二十二年天正冬至得辛巳後天三日以新法上考神龍元年天正冬至得己亥與神龍曆合
