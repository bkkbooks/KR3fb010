body:
  text: 禮部尚書臣范等謹題為議正曆元以成大典事祠祭淸吏司案呈奉本部送禮科抄出河南等處提刑按察司分巡河北道僉事郉雲路奏前事奉聖旨禮部看了來說欽此又該欽天監監正張應候等題為申明曆元乞賜宸斷以杜妄議事奉聖旨禮部知道欽此欽遵通抄到部送司案呈到部為照治曆明時國家首務序正五辰綱紀萬事所係誠為巨重毫忽豈容少差顧首差與不差惟驗之日月星辰而已先在萬曆二十三年鄭世子載堉疏進曆書內稱舊法少差已經本部奉旨覆議以其書下欽天監推算測驗尚無實證未敢遽信為然近據萬曆二十四年閏八月朔日食時刻分秒與欽天監所奏委覺參差臣等方議題請博訪精通曆數之士亟為測驗修正之圖今適河南按察司僉事郉雲路疏請改正曆元諸法良為有見乃欽天監監正張應候又此奏辨惟欲固守舊法夫使舊法無差誠宜世守而今既覺少差矣失今不修將歲愈久而差愈遠其何以齊七政而釐百工哉相應俯從郉雲路所請即行考求磨算漸次修改為是但曆數本極玄微修改非可易議蓋更曆之初上考往古數千年布算雖有一定之法而成曆之後下行將來數百年不無分秒之差前此不覺非其術之疏也以分秒布之百餘年間其微不可紀蓋亦無從測識之耳必積至數百年差至數分而始微見其
