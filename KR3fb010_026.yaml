body:
  text: 授時曆元世祖時許衡等造距至元十八年辛巳歲至萬曆二十二年甲午歲三百一十三年以其法推至元十八年天正冬至得己未日夜半後六刻及推萬曆二十二年天正冬至得己卯日八十六刻先新法四分刻之三以新法上考至元十八年天正冬至得己未日夜半後六刻與授時曆合古有黃帝顓頊夏殷周魯六家之曆今皆不傳而見於史志者自漢迄元凡五十家其積年日法雖殊然用以推古今冬至則一也萬曆二十一年癸巳歲仲冬十一月二十九日己卯加時在夜半前冬至此冬至乃萬曆二十二年甲午歲歲首黃鍾建子之月一陽來復生物之始曆家所謂天正冬至是也今以古曆五十家之法下推甲午歲己卯日冬至其合者僅二家其不合者共四十八家內後一日者二十三家後二日者十五家後五日七日十三日者各一家後三日十四日者各二家後八日者三家以新法上考五十家曆所距之年天正冬至則合者三十六不合者十四其不合者太初三統四分乾象景初泰始三紀與和天保天和大業戊寅此十二家在大衍已前者今以大衍曆考之皆與新法所推同則知新法非不合也蓋彼造曆之時測驗未密祖沖之及一行已有定論矣唐五紀宋崇天此二家者在大衍後蓋寧大衍舊率而失之後天也今以統天曆授時曆考之亦與新法所推同以此觀之古今諸曆相較新法爲密庶幾千歲之日至可坐而致云附錄三條
