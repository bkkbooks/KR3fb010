body:
  text: 曆丁丑冬至加時正在日中以二日十二刻減之天定以乙亥冬至加時在夜半後三十八刻尋古曆法並同四分四分之數久則後天經三百年朔差一日是以漢載四百食率在晦魏代已來遂革斯法世莫之非者誠有效於天也乾象曆漢獻帝時劉洪造距建安十一年丙戌歲至萬曆二十二年甲午歲千三百八十八年以其法推建安十一年天正冬至得乙丑及推萬曆二十二年天正冬至得丙戌後天七日以大衍曆上考建安十一年天正冬至得壬戌新法考之與大衍同景初曆魏明帝時楊偉造距景初元年丁巳歲至萬曆二十二年甲午歲千三百五十七年以其法推景初元年天正冬至得丁未及推萬曆二十二年天正冬至得丁亥後天八日以大衍曆上考景初元年天正冬至得甲辰新法考之與大衍同泰始曆西晉武帝時劉智造距泰始十年甲午歲至萬曆二十二年甲午歲千三百二十年以其法推泰始十年天正冬至得辛酉及推萬曆二十二年天正冬至得丁亥後天八日以大衍曆上考泰始十年天正冬至得戊午新法考之與大衍同三紀曆東晉孝武帝時薑岌造距太元九年甲申歲至萬曆二十二年甲午歲千二百一十年以其法推太元九年天正冬至得戊戌及推萬曆二十二年天正冬至得丁亥後天八日以大衍曆上考太元九年天正冬至得乙未新法考之與大衍同
