body:
  text: 是年十一月三十日癸丑景長見宋志太初壬戌五十刻大衍癸丑六十六刻紀元癸丑二十二刻授時癸丑二十三刻大統癸丑二十八刻新法癸丑二十三刻右太初後天九日餘與天合皇祐四年壬辰歲五月十七日辛酉景短見宋志太初庚午三十七刻大衍辛酉五十三刻紀元辛酉八刻授時辛酉十刻大統辛酉十四刻新法辛酉十刻右太初後天九日餘與天合元豐六年癸亥歲十一月丙午景長見元志太初乙卯七十五刻大衍丙午七十三刻紀元丙午二十六刻授時丙午二十六刻大統丙午二十八刻新法丙午二十五刻右太初後天九日餘與天合元豐七年甲子歲十一月辛亥景長見元志太初辛酉空刻大衍辛亥九十七刻紀元辛亥五十刻授時辛亥五十一刻大統辛亥五十三刻新法辛亥四十九刻右太初後天十日餘與天合元祐三年戊辰歲十一月壬申景長見元志太初壬午空刻大衍壬申九十五刻紀元壬申四十八刻授時壬申四十八刻大統壬申五十刻新法壬申四十六刻
