body:
  text: 食甚酉初初刻昏刻生光酉初二刻一更一點復圓酉正二刻一更三點正西食甚月離黃道畢二度九十四分赤道畢三度九分依舊法算距至元辛巳歲三百二十一年月食十三分二十九秒月未出已食二分五十九秒月已出見食十分七十秒初虧申初初刻在晝正東食既申正一刻在晝食甚酉初初刻昏刻生光酉初二刻一更一點復圓酉正四刻一更四點正西食甚月離黃道畢二度八十四分赤道畢二度九十八分謹按食既在晝則月出已既矣是知舊法所推帶食分誤萬曆三十一年癸卯歲四月丁亥朔日食依新法算距嘉靖甲寅歲四十九年距萬曆辛巳歲二十二年日食八分六十六秒初虧辰初初刻西北食甚辰正一刻正北復圓巳初三刻東北
