body:
  text: 刻乘之為實以法除實得冬至加時在夜半後三十一刻在元嘉曆後一日天數之正也按元儒算晷景其法不同今附載於此是年十月初十日壬戌景長一丈七寸七分五釐十一月二十五日丁未景長一丈八寸一分七釐五毫二十六日戊申景長一丈七寸五分依元儒法當置壬戌戊申二日之景相減餘二分五釐以百刻乘之得二百五十刻為實卻以丁未戊申二日之景相減餘六分七釐五毫為法除之得三十七刻乃置壬戌戊申相距四十六日百刻乘之得四千六百刻凡冬至景前多後少為減減去三十七刻折半得二千二百八十一刻加日中五十刻為二十三日三十一刻命起前距壬戌算外得十一月初三日乙酉三十一刻即所求冬至也欲使初學易曉故詳載之唐志大衍曆議曰祖沖之既失元嘉十三年甲戌冬至以為加時太早增小餘以附會之而十二年戊辰景長得己巳十七年甲午景長得乙未十八年己亥景長得庚子合一失三其失愈多劉孝孫張胄玄因之小餘益強又以十六年己丑景長為庚寅矣治曆者糾合衆同以稽其所異苟獨異焉則失行可知今曲就其一而少者失三多者失五是舍常數而從失行也夫以唐志此說證之則沖之所測景蓋假託而非真雖其算術有可取焉要之其說則是景則非也一行譏胄玄之謬所謂就一失五者即已上六條而元統所造大統曆其失乃與沖之胄玄相類推今雖密考古頗疏李德芳輩蓋不無遺憾云周天和二年丁亥歲十一月初三日庚子景長見隋志太初丙午七十五刻大衍庚子六十一刻
