body:
  text: 右太初後天十日餘與天合元祐四年己巳歲十一月丁丑景長見元志太初丁亥二十五刻大衍戊寅十九刻紀元丁丑七十二刻授時丁丑七十二刻大統丁丑七十四刻新法丁丑七十一刻右太初後天十日大衍後天一日餘與天合元祐五年庚午歲十一月壬午冬至見元志太初壬辰五十刻大衍癸未四十四刻紀元壬午九十六刻授時壬午九十六刻大統壬午九十八刻新法壬午九十五刻右太初後天十日大衍後天一日餘與天合元祐七年壬申歲十一月癸巳冬至見元志太初癸卯空刻大衍癸巳九十二刻紀元癸巳四十五刻授時癸巳四十五刻大統癸巳四十七刻新法癸巳四十三刻右太初後天十日餘與天合元符元年戊寅歲十一月甲子冬至見元志太初甲戌五十刻大衍乙丑三十九刻紀元甲子九十一刻授時甲子九十刻大統甲子九十二刻新法甲子八十九刻右太初後天十日大衍後天一日餘與天合崇寧三年甲申歲十一月丙申冬至見元志太初丙午空刻大衍丙申八十六刻紀元丙申三十七刻授時丙申三十六刻
