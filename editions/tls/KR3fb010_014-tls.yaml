body:
  text: 大衍曆唐玄宗時僧一行等造距開元十二年甲子歲至萬曆二十二年甲午歲八百七十年以其法推開元十二年天正冬至得戊寅及推萬曆二十二年天正冬至得辛巳後天二日以新法上考開元十二年天正冬至得戊寅與入衍曆合五紀曆唐代宗時郭獻之等造距寶應元年壬寅歲至萬曆二十二年甲午歲八百三十二年以其法推寶應元年天正冬至得戊戌及推萬曆二十二年天正冬至得辛巳後天二日以授時曆上考寶應元年天正冬至得丁酉新法與授時同貞元曆唐德宗時徐承嗣等造距建中五年甲子歲至萬曆二十二年甲午歲八百一十年以其法推建中五年天正冬至得癸巳及推萬曆二十二年天正冬至得辛巳後天二日以新法上考建中五年卽是興元元年天正冬至得癸巳與貞元曆合宣明曆唐穆宗時徐昂等造距長慶二年壬寅歲至萬曆二十二年甲午歲七百七十二年以其法推長慶二年天正冬至得壬子及推萬曆二十二年天正冬至得辛巳後天二日以新法上考長慶二年天正冬至得壬子與宣明曆合崇玄曆唐昭宗時邊岡等造距景福元年壬子歲至萬曆二十二年甲午歲七百二年以其法推景福元年天正冬至得己未及推萬曆二十二年天正冬至得辛巳後天二日以新法上考景福元年天正冬至得己未
