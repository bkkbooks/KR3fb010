body:
  text: 食甚月離黃道虛六度八十六分赤道虛六度七十七分萬曆二十七年己亥歲六月癸巳夜望月食依新法算距嘉靖甲寅歲四十五年距萬曆辛巳歲一十八年月食十一分十六秒月未出已食七分五十九秒月已出見食三分五十七秒初虧酉初三刻在晝正東食旣戌初初刻昏刻食甚戌初二刻昏刻生光戌初三刻一更一點復圓亥初初刻一更五點正西食甚月離黃道女七度九十二分赤道女八度三分依舊法算距至元辛巳歲三百一十八年月食十一分十六秒月未出已食二分九十九秒月已出見食八分十七秒初虧酉初二刻在晝正東食旣戌初初刻昏刻食甚戌初二刻昏刻生光戌初三刻一更一點復圓亥初一刻一更五點正西
