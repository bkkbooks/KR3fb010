body:
  text: 鄭世子臣載堉謹撰諸曆冬至考治曆者以其新法與古人課疏密於千百世之上下則往往新法能上合於古舊法不能下合於今布算考之愈前愈疏最後最密以理論之非前人拙後人工也蓋前賢草創之初無所踵襲其法出於自心之精神其用力之勤百倍於後人也後人因前賢已有之法耽玩既久開發益明積習考驗轉為精密略加潤色則青於藍而寒於水其用力少而成功多是故後學之人當感前賢之德補其所未盡則可也以為莫已若則誣也歷代諸曆可考者五十家今列敍其名目并所造之人所距之年各以其術推當時及近歲之冬至復將新率上考與相參校則疏密異同從可知已太初曆漢武帝時鄧平等造三統曆漢平帝時劉歆重造二曆並以太初元年丁丑歲為距至萬曆二十二年甲午歲千六百九十七年以其法推太初元年天正冬至得甲子及推萬曆二十二年天正冬至得癸巳後天十四日唐一行以麟德開元二曆上考太初元年天正冬至當在辛酉謂太初所測非是今以新法上考亦得辛酉與大衍所說同唐志大衍曆議曰太初元年三統曆及周曆皆以十一月夜半合朔冬至日月俱起牽牛一度古曆與近代密率相較二百年氣差一日三百年朔差一日推而上之久益先天引而下之久益後天太初元年周曆以甲子夜半合朔冬至麟德曆以辛酉禺中冬至十二月癸亥晡時合朔氣差三十二辰
