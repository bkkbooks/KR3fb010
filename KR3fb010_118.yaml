body:
  text: 鄭府長史司為恭進曆書上祝萬壽敬陳愚見以仰裨盛典萬一事萬曆二十三年十月二十八日承奉河南等處承宣布政使司劄付承準禮部照會該鄭世子載堉奏前事劄仰本司官吏即便具啓鄭世子知會即將所著律曆融通等書副本作速差人解部轉發欽天監磨算施行等因奉此隨具本啓奉鄭世子令旨曆書原藁十卷今謄録作二册批差小旗劉梯解送仍候勑到日專差官奏謝爾司給批與他敬此敬遵抄出到司擬合呈送為此今將前項緣由同曆書印封理合差人具呈伏乞照驗施行計呈送曆書副本一部全右呈禮部左長史謝廷訓萬曆二十三年十一月二十日右長史關志拯
  hash: sha256:71fa6db11e134b5887cf003c6eba27183cee4ce826064b13b7a6babd35810fe8
