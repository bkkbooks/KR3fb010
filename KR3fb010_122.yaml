body:
  text: 十餘日計二千餘刻日日而量之秒秒而較之皆同未正一刻無殊科此日行所至昭昭在天可以數籌可以景測可與人人共知見者匪人力所私懸想所至也乃大統差至後天九刻餘計氣應應損九百餘分而不自學豈其未嘗籌測耶孟子所謂千歲可坐致者今甫以三百餘年輒差九刻則何論千歲不寧惟是今年立春夏至立冬皆適值子半之交臣測立春刻而大統推丙子臣測夏至壬辰而大統推癸已臣測立冬已酉而大統推庚戌夫立春與冬乃王者行陽德隂德之令而夏至則其祀方澤之期也今皆相隔一日則理人事神之謂何是豈為細故况以立春隔日而生人之年月日時皆非矣此而不改後將何極且曆法疏密驗在交食自昔記之矣乃今年閏八月朔日有食之大統推初虧已正三刻食幾既而臣候初虧已正一刻食止七分餘大統實後天幾二刻而計閏應及轉應若交應則各宜如法增損之矣蓋日食八分以下隂曆交前初虧西北固曆家所共知也今閏八月朔日食實在隂曆交前初虧西北其食七分餘明甚則安得謂之初虧正西食甚九分八十六秒耶而大統之不效亦明甚然此八月也若或值元日於子半則當退履端於月窮而朝賀大禮當在月正二日矣又可謂細故耶此而不改臣竊恐愈久愈差將不流而至春秋之食晦不止也臣故日閏應轉應交應之宜俱改也我朝
