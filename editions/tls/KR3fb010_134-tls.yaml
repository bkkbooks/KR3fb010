body:
  text: 萬曆二十五年正月二十四日抄欽天監監正張應候等謹題爲申明曆元乞賜宸斷以杜妄議事臣等仰荷聖恩職司臺監凡星象曆數選擇堪輿數事莫不夙夜匪懈兢兢業業毫無敢忽此臣等上報國恩而下盡臣子之職分也臣等于萬曆二十四年十二月内偶接得河南僉事邢雲路揭帖開稱大統曆筭差訛悉宜改正臣等不勝駭異查得昔帝堯乃命羲和欽若昊天曆象日月星辰敬授人時迄于周秦漢晉唐宋以來不啻數十家更改損益以至于元而有郭守敬岀焉是以上考往古下驗將來斟酌損益以成一代之曆其歲差歲實諸應氣策立法之密槩無岀其右者矣及而我太祖高皇帝統率華夷乃命監正元統等分步推測考往驗來皆依守敬之法節氣交食分秒時刻毫無增損始更名曰大統曆又而取之西夷設監立官推步回回曆數較對大統務求脗合以成一代之大典是遵祖宗之守制也今僉事邢雲路陳言曆數之差前後相懸一日又不知是遵何家之法而輕信何人妄議者也且國朝立法律例備載有人私習天文曆數者罪之私傳妄議者罪同況元郭守敬王恂等職司太史尚且奉其勑方敢更正諸曆我國朝監正元統雖奉
  hash: sha256:ff33732be89eb11413d9680bb987fd42ccafb94c6fc4e26e1f5f062ff1551bf2
