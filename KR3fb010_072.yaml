body:
  text: 鄭世子臣載堉謹撰古今交食考前代課曆故事取各家所造之曆各使推而上之於千百世之上以求交食與夫歲月日星辰之著見於經史者為合與否然後推而下之以定當來之氣朔則知與往古相合者為密不合者為疏甚易辨也萬曆九年辛巳歲距漢武帝元光元年丁未歲一千七百一十四年距陳宣帝太建八年丙申歲一千有五年二者之間史志原載日月食分加時起復方位各取數事而以元儒舊法并今新法考之自唐已下不必考者未及千年故略之也仍取萬曆甲午已後日月交食亦各數事較其異同筆於此卷往則稽於史來則驗於天而新舊二家疏密可見矣漢武帝元光元年七月癸未先晦一日日有食之在翼八度劉向云日中時食從東北過半晡時復見前漢書五行志謹按日食必起自西理無從東起者疑有脫文故也當作從西北向東北食過半過半謂六七分已上是歲有閏而漢曆失閏故以為七月晦晦閏之失辨見別卷兹不復贅依新法算距嘉靖甲寅歲一千六百八十七年距萬曆辛巳歲一千七百一十四年日食九分四十九秒初虧午正一刻西北食甚未初三刻正北復圓申初初刻東北
