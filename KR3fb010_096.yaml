body:
  text: 食甚月離黃道女七度八十三分赤道女七度九十三分謹按此與太建八年帶食其理相同舊法應見者爲不見應不見者爲見與新法異焉至期驗天則知疏密萬曆二十九年辛丑歲十一月己酉夜望月食依新法算距嘉靖甲寅歲四十七年距萬曆辛巳歲二十年月食七分八十九秒初虧丑初初刻三更五點東南食甚丑正二刻四更三點正南復圓寅初三刻四更五點西南食甚月離黃道畢十四度六分赤道畢十四度九十三分復圓亥初初刻一更五點正西食甚月離黃道女七度九十二分赤道女八度三分依舊法算距至元辛巳歲三百一十八年月食十一分十六秒月未出已食二分九十九秒月已出見食八分十七秒初虧酉初二刻在晝正東食旣戌初初刻昏刻食甚戌初二刻昏刻生光戌初三刻一更一點復圓亥初一刻一更五點正西
