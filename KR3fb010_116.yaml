body:
  text: 擬合就行為此合就照會該布政司著落當該官吏照依照會內事理轉行鄭府長史司啓世子知會即將所著律曆融通等書副本作速差人解部以憑轉發欽天監磨算施行等因承此擬合就行為此劄仰本司官吏照依劄付備承照會內事理即便具啓鄭世子知會即將所著律曆融通等書副本作速差人解部轉發欽天監磨算施行毋得遲違未便奉此擬合具啓為此今將前項緣由理合具本謹具啓聞伏候令旨左長史臣謝廷訓萬曆二拾參年拾一月初一日右長史臣關志拯
