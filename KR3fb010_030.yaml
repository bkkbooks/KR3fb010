body:
  text: 新法為密大統為疏亦昭然矣後漢志曰曆不差不改不驗不用未差無以知其失未驗無以知其是安然後改是然後用此前賢定論也今亦未敢自以新法為是恭候欽依清臺測驗可以決其是否耳餘條冬夏至悉皆放云一萬曆三十八年庚戌歲依大統曆丙子日子正二刻小滿該閏三月依新法乙亥日亥正一刻小滿該閏四月萬曆四十年壬子歲依大統曆庚寅日子正初刻大寒該閏十一月依新法己丑日亥初三刻大寒該閏十二月皆因時差一辰遂致氣差一日而致閏差一月若庚戌歲者不獨差一月又且差一季以夏為春矣傳曰閏以正時時以作事事以厚生生民之道於是乎在可不愼歟此亦曆家之所當辨者也已上三條乃議曆之要務是故表而出之伏候聖明采擇萬年曆備考卷之一
  hash: sha256:4d748111bdd57681e8cdffa5ba29c5eed1833ba45f72a19db9d3cdbfbac543aa
