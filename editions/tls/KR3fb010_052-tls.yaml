body:
  text: 紀元癸未八十刻授時癸未九十五刻大統甲申二十三刻新法癸未九十六刻右太初後天八日大統後天一日餘與天合宋景德四年丁未歲十一月戊辰日南至見元志太初丙子七十五刻大衍戊辰十五刻紀元丁卯七十四刻授時丁卯八十刻大統丁卯八十五刻新法丁卯七十九刻右太初後天八日大衍與天合餘皆先天一日元志授時曆議云自宋以來測景驗氣者凡十七事其景德丁未歲戊辰日南至統天授時皆得丁卯是先一日嘉泰癸亥歲甲戌日南至統天授時皆得乙亥是後一日一失之先一失之後若曲變其率以從景德則其餘十六事多後天若從嘉泰則其餘十六事多先天以此理推之非曆不合也蓋類其同則知其中辨其異則知其變已下二條放此皇祐元年己丑歲十一月十九日戊申景長見宋志太初丁巳二十五刻大衍戊申四十二刻紀元丁未九十七刻授時丁未九十九刻大統戊申四刻新法丁未九十九刻右太初後天九日大衍大統與天合餘皆先天一日皇祐二年庚寅歲五月二十五日辛亥景短見宋志太初己未八十七刻大衍辛亥四刻紀元庚戌六十刻授時庚戌六十一刻大統庚戌六十六刻新法庚戌六十一刻右太初後天八日大衍與天合餘皆先天一日
