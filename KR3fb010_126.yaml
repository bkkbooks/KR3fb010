body:
  text: 熙朝之大典將見理隂敘陽各得其所時惠辰從職不相侵蓋先後天而不違乃謂之欽若昊天天不違而况人乎乃可以敬授人時百工允釐庶績咸熙聖德則天光於上下此帝堯相傳之統格天之致也尢是東隅西極南交北狄胥曉然見天人之明正炯炯洞洞覩大聖人之作爲岀尋常萬倍而國家億萬年曆數無疆之休端在是矣臣不勝悚悚待命之至爲此具本專差書吏劉欽親齎謹具奏聞伏候勑旨萬曆二十四年十二月十九日奉聖旨禮部看了來説欽此
  hash: sha256:45065162310b3681001d3c8e5a3d8e7231ef67c921c415b71ae75f3177ea8db4
