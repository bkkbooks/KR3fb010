body:
  text: 擬合就行爲此合就照會該布政司著落當該官吏照依照會內事理轉行鄭府長史司啟世子知會卽將所著律曆融通等書副本作速差人解部以憑轉發欽天監磨算施行等因承此擬合就行爲此劄仰本司官吏照依劄付備承照會內事理卽便具啟鄭世子知會卽將所著律曆融通等書副本作速差人解部轉發欽天監磨算施行毋得遲違未便奉此擬合具啟爲此今將前項緣由理合具本謹具啟聞伏候令旨左長史臣謝廷訓萬曆貳拾參年拾壹月初壹日右長史臣關志拯
