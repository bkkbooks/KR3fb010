body:
  text: 九十八年庚戌歲五月夏至大統辛酉一刻新法庚申八十八刻授時庚申八十九刻百年壬子歲十一月冬至大統甲戌十二刻新法癸酉九十八刻授時甲戌初刻千年壬子歲十一月冬至大統壬子三十七刻新法庚戌九十刻授時庚戌八十一刻萬年壬子歲十一月冬至大統甲戌八十七刻新法壬寅十六刻授時己丑八十九刻先大統百五日先新法十三日已上預推未來二至新舊三家各有異同宜於其時測驗晷景以證新舊曆孰爲疏密也謹述大槪以發其端附於此卷之末自萬曆元年已來百年之間大統授時二曆相差不過十餘刻及至千年則差二日萬年則差百有餘日所差非不多也新率恒處二曆強弱之間得中平之數云萬年曆備考卷之二
