body:
  text: 萬曆二十四年丙申歲五月夏至大統癸巳六刻新法壬辰九十八刻授時壬辰九十七刻二十八年庚子歲五月夏至大統甲寅三刻新法癸丑九十四刻授時癸丑九十四刻三十二年甲辰歲五月夏至大統乙亥初刻新法甲戌九十一刻授時甲戌九十一刻三十八年庚戌歲十一月冬至大統己酉八刻新法戊申九十八刻授時戊申九十八刻四十二年甲寅歲十一月冬至大統庚午五刻新法己巳九十五刻授時己巳九十五刻四十六年戊午歲十一月冬至大統辛卯二刻新法庚寅九十二刻授時庚寅九十二刻五十三年乙丑歲五月夏至大統乙丑十刻新法甲子九十九刻授時甲子九十九刻五十七年己巳歲五月夏至大統丙戌七刻新法乙酉九十六刻授時乙酉九十六刻
