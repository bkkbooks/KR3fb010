body:
  text: 紀元庚子五十五刻授時庚子六十五刻大統辛丑十五刻新法庚子七十一刻右太初後天六日大統後天一日餘與天合天和三年戊子歲十一月十四日乙巳景長見隋志太初壬子空刻大衍乙巳八十六刻紀元乙巳七十九刻授時乙巳九十刻大統丙午四十刻新法乙巳九十五刻右太初後天七日大統後天一日餘與天合建德元年壬辰歲十一月二十九日丁卯景長見隋志太初癸酉空刻大衍丙寅八十三刻紀元丙寅七十七刻授時丙寅八十七刻大統丁卯三十七刻新法丙寅九十三刻右太初後天六日大統與天合餘皆先天一日建德二年癸巳歲五月初三日戊辰景短見隋志太初乙亥六十二刻大衍己巳四十六刻紀元己巳三十九刻授時己巳四十九刻大統己巳九十九刻新法己巳五十五刻右按曆法凡冬夏二至相距一百八十二日六十二刻有奇是歲歲前天正冬至在丁卯丁卯距戊辰不足一百八十二日必無戊辰夏至之理若就戊辰夏至則失丁卯冬至此蓋隋志之誤無疑諸曆推己巳者為是惟太初後天六日建德三年甲午歲十一月二十日丁丑景長見隋志太初癸未五十刻大衍丁丑三十二刻紀元丁丑二十五刻授時丁丑三十六刻
