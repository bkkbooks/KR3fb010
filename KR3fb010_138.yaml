body:
  text: 成命自知才不及守敬法不能易改是以遵奉明旨將授時曆改為大統曆名雖易而法術同雖經三百年來迄今雍熙太平相沿已久天道䐇合交食準驗年愈遠而數愈真其後有樂護筆湘等勉強欲求斟酌改易並未奉行考之今時賢才無守敬學業無元統雖有毫末之聰未敢擅議于一時也當國初時苟可更之分秒錯綜一遍改易始成一代之名豈不可乎是知其必不可改也今我皇上聖神英武法令嚴明若聽雲路之疏變易成法反復天道是知其不易為也今邢雲路之請尚未奉行而都邸中外官民謠誦曰大統曆數差錯朔日相越一日惑世誣民變亂成法是誰之過歟且臣等本監造曆一載年前頒朔天下共知奈何郉雲路復生異議今使衆外臣民洶洶不安紛紛議起郉雲路是誠何心矣伏望皇上奮宸斷勑下禮部酌議如果臣等曆數有差願選海內高明之士有能精於曆數者公同考較如果臣等歷年交食䐇合天道時節分秒不移或遵祖制業依古法仍勑下中外臣民勿生妄議行令厰衛五城衙門嚴加禁約如有妄議謠傳曆數差訛者許緝拿究問如律庶止訛言曆數之非庶止中外臣民之議則天下幸甚臣等幸甚矣奉聖旨禮部知道欽此
  hash: sha256:a30fca96c9867e9ba4c018347165d9bc6634575412954b70ab3b89d2f9c28e89
