body:
  text: 食甚日躔黃道胃十二度二十一分赤道胃十二度十四分依舊法算距至元辛巳歲三百二十二年日食七分九十八秒初虧辰初二刻西北食甚辰正四刻正北復圓巳正一刻東北食甚日躔黃道胃十二度十三分赤道胃十二度六分萬曆三十一年癸卯歲十月戊戌夜望月食依新法算距嘉靖甲寅歲四十九年距萬曆辛巳歲二十二年月食四分四十秒初虧子正四刻三更五點東北食甚丑正一刻四更二點正北復圓寅初二刻四更五點西北食甚月離黃道昴二度六十二分赤道昴二度六十七分依舊法算距至元辛巳歲三百二十二年月食四分四十秒初虧丑初一刻四更一點東北食甚丑正三刻四更四點正北復圓寅正一刻五更一點西北食甚月離黃道昴二度五十四分赤道昴二度五十九分
