body:
  text: 筭之士末技雖善經實弗明其奈何以國制鉅任畀之豈鄧平虞喜沈括輩各名家不能定一一尋常曲士易能哉譬之今鼎建大工操尺與運斤者缺一焉不可爲矣矧履端節至萬曆方新纂修國典諸法畢備失今不舉後需何期伏乞勑下該部諭令僉事邢雲路卽以原官暫署欽天監俾相資訂正仍選委在京各衙門素明曆法者二三員責之贊襄大務以共成一代之典而決千古之疑中外臣民實不勝願望脫有襲故者目之爲多事言未及而阻泥隨之不敢云克濟也已云云右自邸報抄岀内有脫文誤字俟獲原本校正
