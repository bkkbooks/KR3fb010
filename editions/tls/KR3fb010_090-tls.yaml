body:
  text: 距萬曆辛巳歲一十五年月食三分七十秒月未入已復二分七秒月已入不見復一分六十三秒初虧寅初三刻五更三點東北食甚寅正三刻曉刻正北復圓卯初三刻在晝西北食甚月離黃道角五度六分赤道角四度七十六分依舊法算距至元辛巳歲三百一十五年月食三分七十一秒月未入已復二分八十秒月已入不見復九十一秒初虧寅初四刻五更三點東北食甚卯初初刻曉刻正北復圓卯正一刻在晝西北食甚月離黃道角四度九十六分赤道角四度六十七分萬曆二十四年丙申歲閏八月乙丑朔日食依新法算距嘉靖甲寅歲四十二年距萬曆辛巳歲一十五年日食九分七十五秒初虧已正三刻西北食甚午正初刻正北
