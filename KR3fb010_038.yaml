body:
  text: 紀元甲午六十一刻授時甲午六十八刻大統乙未三十六刻新法甲午七十四刻右太初後天六日大統後天一日餘與天合元嘉十八年辛巳歲十一月二十一日己亥景長見隋志太初乙巳二十五刻大衍己亥八十二刻紀元己亥八十五刻授時己亥九十三刻大統庚子六十刻新法己亥九十八刻右太初後天六日大統後天一日餘與天合元嘉十九年壬午歲十一月初三日乙巳景長見隋志太初庚戌五十刻大衍乙巳六刻紀元乙巳十刻授時乙巳十七刻大統乙巳八十四刻新法乙巳二十三刻右太初後天五日餘與天合大明五年辛丑歲十一月初三日乙酉冬至見前宋志太初庚寅二十五刻大衍甲申七十刻紀元甲申七十三刻授時甲申七十九刻大統乙酉四十五刻新法甲申八十六刻右太初後天五日大統與天合餘皆先天一日宋書元嘉曆推是年冬至在甲申日八十刻祖沖之以爲曆誤乃上議曰臣測景歷紀躬辨分寸銅表堅剛暴潤不動光晷明潔纖毫㦎然據大明五年十月十日景一丈七寸七分半十一月二十五日一丈八寸一分太二十六日一丈七寸五分強折取其中則中天冬至應在十一月三日求其蚤晚令後二日景相減則一日差率也倍之爲法前二日相減百
