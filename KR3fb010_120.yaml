body:
  text: 附錄河南等處提刑按察司分巡河北道僉事臣郉雲路謹奏爲議正曆元以成大典事臣惟稽古帝王必以治曆明時爲首務蓋其重也大哉帝堯其首首命羲和氏曰欽若昊天曆象日月星辰敬授人時而卽以咨帝舜曰天之曆數在爾躬其重如此嗣是夏后殷周紹明三正有自來矣下逮春秋始爽厥德於是有日至之愆不朔之食豈天路之殊常抑日官之失職歟漢唐以降迄於宋元治曆家亡慮數十其表見者如鄧平祖沖之李淳風僧一行郭守敬輩殫心思求天運或差而改改而差差而復改率皆由淺之深由疎之密惟郭守敬乃臻其妙焉誠可謂冠絕古今矣然而守敬亦未嘗自信爲無差也觀其謂積年距至元辛已爲元則可其諸應宜隨時測驗者用辛已爲元則不可今司天氏固祖述郭守敬太史者而胡不是之察也臣少習乾象長益篤嗜凡硏思二十餘年乃有所得始覺古人有未盡而今時有不然者何也蓋天日之交氣之齊也日月之交朔之會也日忒而氣不齊月愆而朔不會今之弊也夫窺天之器宜無踰於觀象測景候時籌策四事矣臣今以四事窺天運胥日異而月不同焉孟子曰天之高也星辰之遠也苟求其故千歲之日至可坐而致也然則日之至乃天之根氣之始所關大矣乃今之日至何如也大統推今年冬至在申正二刻而臣測在未正一刻大統實後天九刻餘蓋以癸已甲午丙申丁酉之晷相加減實測二百五十九刻七十三分四十五秒得乙未日未正一刻冬至復取前後二
