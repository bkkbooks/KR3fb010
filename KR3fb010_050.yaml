body:
  text: 大統己未十九刻新法戊午八十六刻右太初後天七日大統後天一日餘與天合儀鳳元年丙子歲十一月壬申景長見元志太初己卯空刻太衍壬申二十五刻紀元壬申十刻授時壬申二十二刻大統壬申五十九刻新法壬申二十七刻右太初後天七日餘與天合永淳元年壬午歲十一月癸卯景長見元志太初庚戌五十刻大衍癸卯七十二刻紀元癸卯五十七刻授時癸卯七十四刻大統甲辰四刻新法癸卯七十三刻右太初後天七日大統後天一日餘與天合開元十年壬戌歲十一月癸酉景長見元志太初庚辰五十刻大衍癸酉四十九刻紀元癸酉三十一刻授時癸酉四十六刻大統癸酉七十四刻新法癸酉四十七刻右太初後天七日餘與天合開元十一年癸亥歲十一月戊寅景長見元志太初乙酉七十五刻大衍戊寅七十四刻紀元戊寅五十五刻授時戊寅七十刻大統戊寅九十八刻新法戊寅七十一刻右太初後天七日餘與天合開元十二年甲子歲十一月癸未景長見元志太初辛卯空刻大衍癸未九十八刻
