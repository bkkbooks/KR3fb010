body:
  text: 端今欲驗之亦必測候數年而始微得其槩即今該監人員不過因襲故常推衍成法而已若欲斟酌損益緣舊為新必得精諳曆理者為之總統其事選集星家多方測候積算纍歲較析毫芒然後可為凖信裁定規制今據郉雲路奏議詳悉研窮星曆之家考正舊法之差似得肯綮蓋一時五官疇人未有能及之者相應專任責成合無咨行吏部即以僉事郉雲路行取入京添注五品京銜提督欽天監事該監人員皆聽約束本部仍博訪通曉曆法之士悉送本官委用務親自督率各官測候二至太陽晷刻逐月中星躔庶及驗日月交食起復時刻分秒方位諸數隨録逐一開呈御覽積之數年酌定歲差修正舊法則萬世之章程不易而一代之實曆惟精其於國家敬天勤民之政亦誠大有裨補矣其見行二十六年曆日該監仍照舊法推算不與相妨及查律例所禁乃指民間妄以管窺而測妖祥僞造曆書而紊氣翊者言若天官書天文志曆書曆志載在曆代國史古云通天地人謂之儒學士大夫所宜通曉第患不能精耳非槩以例禁之也據大明會曲明開天文地理藝術之人禮部務要備知以憑取用仍行天下訪取考驗收用在弘治十年令訪取世業原籍子孫併山林隱逸之士及致仕退間等項官吏生儒軍民人等有能精通天文者試中取用在嘉靖元年工科給事中吳巖題請考選精術以備國用本部覆奉欽依保舉精通天文曆法者不拘致仕官員監生生員山林隱逸
