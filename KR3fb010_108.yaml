body:
  text: 鄭府長史司左長史臣謝廷訓等謹啟爲恭進曆書上祝萬壽敬陳愚見以仰裨盛典萬一事萬曆二十三年十月二十八日承奉河南等處承宣布政使司劄付承準禮部照會該本部題祠祭清吏司案呈奉本部送內府抄出鄭世子載堉奏前事內稱大統曆倘有小差乞要更正以成一代之制宜新其名爲聖壽萬年曆及將所著新法十冊恭進等因奉聖旨禮部知道欽此欽遵抄出到部送司案呈到部看得鄭世子載堉恭進曆書上祝萬壽欲要更新其名及將大統曆所差卽便改正各一節爲照人君欽若天道敬授民時以成治功者莫大於曆是故自堯舜相傳以來靡不重之所以大一統也我太祖高皇帝創有天下卽治曆明時頒行中外命之曰大統蓋不惟昭王者無外之義而聖子神孫億萬年無強之祚卽在於是殆有不可取數限量者焉列聖相承毫無異議皇上紹天纘緒繼治安民二十有三載夫旣叶泰階之符而際昇平之盛矣迺者萬壽屆期四方來賀鄭世子載堉恭獻聖壽萬年曆書併
  hash: sha256:c9454b89d5c95c03e0078bdb6f3320d6173b8d57e8bc12c5c3497e38216e8735
