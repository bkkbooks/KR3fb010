body:
  text: 大統乙亥五十二刻新法乙亥十刻右太初後天六日紀元先天一日餘與天合開皇六年丙午歲十一月初三日庚辰景長見隋志太初丙戌五十刻大衍庚辰二十五刻紀元庚辰十八刻授時庚辰三十四刻大統庚辰七十六刻新法庚辰三十四刻右太初後天六日餘與天合開皇七年丁未歲五月初九日癸未景短見隋志太初己丑十二刻大衍壬午八十八刻紀元壬午八十刻授時壬午九十六刻大統癸未三十八刻新法壬午九十六刻右太初後天六日大統與天合餘皆先天一日是年十一月十四日乙酉景長見隋志太初辛卯七十五刻大衍乙酉五十刻紀元乙酉四十二刻授時乙酉五十九刻大統丙戌初刻新法乙酉五十八刻右太初後天六日大統後天一日餘與天合開皇十一年辛亥歲十一月二十八日丙午景長見隋志太初壬子七十五刻大衍丙午四十八刻紀元丙午四十刻授時丙午五十六刻大統丙午九十七刻新法丙午五十六刻右太初後天六日餘與天合開皇十四年甲寅歲十一月辛酉朔旦冬至見隋志太初戊辰五十刻大衍壬戌二十一刻
