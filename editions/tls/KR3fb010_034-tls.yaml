body:
  text: 元志乃云自春秋獻公以來者許郭諸儒多聞博古豈不知獻公在春秋前百餘年哉第以所推昭公己丑冬至而得戊子旣不能合偶與獻公相合故援此以飾非而爲之説云曲變曆法以從昭公則與獻公不合遂謂春秋所書昭公冬至乃日度失行之驗然則大衍宣明諸曆推之皆得己丑豈皆誤耶夫獻公甲寅冬至別無所據惟劉歆三統曆是據也若左傳不足信而歆獨可信乎太初元年冬至在辛酉歆乃以爲甲子差天三日尙不能知而能逆知上下數百載乎然則獻公十五年冬至當在何日曰三統授時之甲寅失之先紀元大定之丁巳失之後大衍所推丙辰宣明所推乙卯庶或近之然別無所考據闕其疑可也以要言之凡春秋前後千載之間氣朔交食長曆大衍所推近是劉歆班固所説全非杜預一行已有定論詳載別卷矣劉宋元嘉十二年乙亥歲十一月十五日戊辰景長見隋志太初癸酉七十五刻大衍戊辰三十五刻紀元戊辰三十九刻授時戊辰四十七刻大統己巳十四刻新法戊辰五十二刻右太初後天五日大統後天一日餘與天合元嘉十三年丙子歲十一月二十六日甲戌景長見隋志太初己卯空刻大衍癸酉五十九刻紀元癸酉六十三刻授時癸酉七十一刻大統甲戌三十九刻新法癸酉七十六刻右太初後天五日大統與天合餘皆先天一日唐志大衍曆議曰較前代史官注記惟元嘉十三年十一月
