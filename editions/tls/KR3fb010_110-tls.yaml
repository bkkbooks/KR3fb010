body:
  text: 請因時改名原其用心無非俯竭一得之忱欲效萬年之祝意甚善也但臣等查得會典凡造曆以洪武甲子爲曆元仍依舊法推算不用捷法夫曆元必用洪武甲子者所以重一代開創之本而推算用舊法者誠以天有常度苟求其故千歲之日至可坐而致所謂故者言天運自然之常度有成法可求不必于鑿也今大統曆以我太祖之聰明睿智遡考前代推步之法而用元郭守敬之術立表以測景考景以驗氣上符天運下順民時以成之皆因其故也是以行之二百餘年重熙累洽蓋自畿甸以及要荒凡雕題椎結殊鄉異俗一皆稟受正朔此萬萬世不可易者行之旣久習之已熟一旦而欲更新其名無論非祖宗創制立法至意且恐駭華夷之觀聽也又考元曆志至元四年西域札馬魯丁撰進萬年曆世祖稍頒行之十三年平宋遂詔前中書左丞許衡太子贊善王恂都少監郭守敬等改治新曆參考累代曆法復測候日月星辰消息運行之變參別異同酌取中數以爲曆本至十七年冬至曆成名曰授時曆十八年頒行天下萬年曆不復行則萬年曆名元旣有之雖行而未久亦不便於襲用矧今年號萬曆業已該萬年之義曆名改擬之説臣等未敢輕議至於歲差之法上古無聞蓋一元肇啟四序適調天有常運日月星辰行有常度自無差忒自唐虞以降暨於春秋時令不無愆其候矣詎非氣漸澆漓運行乖舛而致然歟然而差法猶未立也逮漢洛下閎始知有差及晉虞喜始立差法自是宋何承天祖沖之梁虞
