body:
  text: 其法推興和二年天正冬至得甲戌及推萬曆二十二年天正冬至得辛巳後天二日以大衍曆上考興和二年天正冬至得癸酉新法與大衍同天保曆北齊文宣帝時宋景業造距天保元年庚午歲至萬曆二十二年甲午歲千四十四年以其法推天保元年天正冬至得丁卯及推萬曆二十二年天正冬至得壬午後天三日以大衍曆上考天保元年天正冬至得丙寅新法與大衍同天和曆周武帝時甄鸞造距天和元年丙戌歲至萬曆二十二年甲午歲千二十八年以其法推天和元年天正冬至得己丑及推萬曆二十二年天正冬至得庚辰後天一日以大衍曆上考天和元年天正冬至得庚寅新法與大衍同大象曆周靜帝時馬顯等造距大象元年己亥歲至萬曆二十二年甲午歲千一十五年以其法推大象元年天正冬至得戊戌及推萬曆二十二年天正冬至得庚辰後天一日以新法上考大象元年天正冬至得戊戌與大象曆合開皇曆隋文帝時張賓等造距開皇四年甲辰歲至萬曆二十二年甲午歲千一十年以其法推開皇四年天正冬至得甲子及推萬曆二十二年天正冬至得庚辰後天一日以新法上考開皇四年天正冬至得甲子與開皇曆合皇極曆隋文帝時劉焯造
