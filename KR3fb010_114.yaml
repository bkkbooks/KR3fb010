body:
  text: 各差一日今似未至此也此以曆家雖有成法猶以測驗為準為今之計宜令星曆之官再加詳推以求歲差之故亟為更正嘗聞前禮官鄭繼之有言欲定歲差宜定歲法於二至餘分絲忽之間定日法於氣朔盈虛一畫之際定日月交食於半秒難分之所斯其言似中曆家肯綮要在得精思善算而又知曆理者以職其事誠博求之不可謂世無其人而其本又在我皇上秉欽若之誠以建中和之極光調玉燭默運璇璣正曆數以永大統之傳是在今日誠干載一時也臣等竊觀鄭世子所著新法其原本進呈恭備御覽未便翻閲恐致損汙合無行河南布政司轉行該府長史司具啓世子知會另將副本解部轉發欽天監與世業各科曆官所傳諸書互相參訂細加磨算務使分秒微纖隨時測驗蘄於不爽則曆數之奧既占而有孚天運之常亦算無遺策矣若夫世子載堉不以崇高富貴為逸豫之圖乃能留心曆學博通今古志行既為可尚忠愛良有足嘉即東平河間何以稱焉相應賜勑獎諭以示優褒取自聖裁恭候命下臣等遵奉施行等因萬曆二十三年九月十九日本部尚書兼翰林院學士范等具題二十三日奉聖旨是鄭世子著寫勑獎諭欽此欽遵除將獎諭一節另行移文撰勑外所據新著律曆融通等書副本相應開取案呈到部
