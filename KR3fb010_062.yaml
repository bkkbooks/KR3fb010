body:
  text: 太初丙辰八十七刻大衍丙午七十六刻紀元丙午十四刻授時乙巳九十五刻大統乙巳九十五刻新法乙巳九十五刻右太初後天十一日大衍紀元後天一日餘與天合是年十一月戊申日未初三刻冬至見元志太初己未五十刻大衍己酉三十八刻紀元戊申七十六刻授時戊申五十七刻大統戊申五十七刻新法戊申五十七刻右太初後天十一日大衍後天一日餘與天合至元十六年己卯歲五月辛亥日寅正二刻夏至見元志太初壬戌十二刻大衍壬子一刻紀元辛亥三十九刻授時辛亥十九刻大統辛亥十九刻新法辛亥十九刻右太初後天十一日大衍後天一日餘與天合是年十一月癸丑日戌初二刻冬至見元志太初甲子七十五刻大衍甲寅六十三刻紀元甲寅一刻授時癸丑八十一刻大統癸丑八十一刻新法癸丑八十一刻右太初後天十一日大衍紀元後天一日餘與天合至元十七年庚辰歲十一月己未日丑初一刻冬至見元志太初庚午空刻大衍己未八十七刻紀元己未二十五刻授時己未六刻大統己未六刻新法己未六刻右太初後天十一日餘與天合
