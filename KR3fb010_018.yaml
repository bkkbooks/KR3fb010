body:
  text: 正冬至得辛巳後天二日以新法上考乾興元年天正冬至得辛巳與乾興曆合崇天曆宋仁宗時宋行古造距天聖二年甲子歲至萬曆二十二年甲午歲五百七十年以其法推天聖二年天正冬至得壬辰及推萬曆二十二年天正冬至得辛巳後天二日以授時曆上考天聖二年天正冬至得辛卯新法與授時同明天曆宋英宗時周琮等造距治平元年甲辰歲至萬曆二十二年甲午歲五百三十年以其法推治平元年天正冬至得辛酉及推萬曆二十二年天正冬至得庚辰後天一日以新法上考治平元年天正冬至得辛酉與明天曆合奉元曆宋神宗時沈括等造距熙寧七年甲寅歲至萬曆二十二年甲午歲五百二十年以其法推熙寧七年天正冬至得癸丑及推萬曆二十二年天正冬至得庚辰後天一日以新法上考熙寧七年天正冬至得癸丑與奉元曆合觀天曆宋哲宗時皇居卿造距元祐七年壬申歲至萬曆二十二年甲午歲五百二年以其法推元祐七年天正冬至得戊子及推萬曆二十二年天正冬至得庚辰後天一日以新法上考元祐七年天正冬至得戊子與觀天曆合占天曆宋徽宗時姚舜輔造距崇寧二年癸未歲至萬曆二十二年甲午歲四百九十一年
