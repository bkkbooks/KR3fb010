body:
  text: 初虧申正三刻昏刻正東食甚酉正二刻一更三點復圓戌正一刻二更一點正西食甚月離黃道柳二度七十九分赤道柳二度九十七分宋文帝元嘉十四年五月十五日丁夜月食盡在斗二十六度以衝計之日當在井三十同上謹按赤道斗無二十六度唐志大衍曆議云古以牽牛上星為距太初改用中星然則斗二十六度者漢太初曆所測也新法改斗二十六度為牛初度依近代所測也依新法算距嘉靖甲寅歲一千一百一十七年距萬曆辛巳歲一千一百四十四年月食十一分六十二秒初虧子正初刻三更三點正東食既丑初一刻四更二點食甚丑初三刻四更四點生光丑正初刻四更五點復圓寅初一刻五更四點正西食甚月離黃道牛初度五十一分赤道牛初度五十五分依舊法算距至元辛巳歲八百四十四年月食十一分六十二秒初虧子正初刻三更四點正東食既丑初二刻四更三點
