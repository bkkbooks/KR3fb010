body:
  text: 甲戌景長皇極麟德開元曆皆得癸酉蓋日度變常爾元授時曆所議亦同今按前人考古景長之驗或不相合則云日度失行竊謂此言過矣苟日度失行當如歲差漸漸而移今歲既已不合來歲豈能復合耶蓋係前人所測或未密耳非日度變行也夫冬至之景一丈有餘表高晷長則景虛而淡欲就虛景之中考其真實或設望筒或置副表景符之類以求實景然望筒或一低昂副表景符或一前卻兼以測景之人工拙不同用意詳略亦異所據之表或稍有傾敧圭面或稍有斜側二至前後數日之景進退只在毫釐之間僾俙之際要亦難辨若夫陽城嶽臺略分南北尚有不同況於四海九服之遠相去千有餘里委託之人未知當否既非目擊其實所報晷景寧足信乎元嘉十五年戊寅歲十一月十八日甲申景長見隋志太初己丑五十刻大衍甲申八刻紀元甲申十二刻授時甲申二十刻大統甲申八十七刻新法甲申二十五刻右太初後天五日餘與天合元嘉十六年己卯歲十一月二十九日己丑景長見隋志太初甲午七十五刻大衍己丑三十三刻紀元己丑三十七刻授時己丑四十四刻大統庚寅十一刻新法己丑五十刻右太初後天五日大統後天一日餘與天合元嘉十七年庚辰歲十一月初十日甲午景長見隋志太初庚子空刻大衍甲午五十七刻
