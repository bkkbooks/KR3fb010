body:
  text: 𠠎隋劉焯張胄玄唐僧一行宋王朴沈括輩各有差法之議訖無畫一之規大都所約年限有遠近所置分度有疏密耳至元許衡郭守敬等乃測景於四表毫忽微眇皆有可考約以六十六年差一度考往則每百年減一推來則每百年加一其法號爲精密我朝制曆實用其法則差法固在向遵用之宜無復異者近屢有言曆法差訛當爲考正然於何而正之所以求之者大約有三曰考月令之中星移次應節曰測二至之日景長短應候曰驗交食之分秒起復應時考以衡管測以臬表驗以刻漏斯亦佹得之矣夫天體至廣曆家以周天三百六十五度四分度之一而紀日月星辰之行次又析一度爲百分一分爲百秒可謂密矣然在天一度應地二千九百三十二里其在分秒又可推也譬之輪轂外廣而中漸以狹至於輻輳之處間不容髮矣夫渾儀之體徑僅數尺外布三百六十五度四分度之一每度不及相許安所置分秒哉至於臬表之樹不過數尺刻漏之籌不越數寸以天之高且廣也而以徑尺寸之物求之欲其纖微不爽不亦難乎故方其差在分秒之間無可驗者至踰一度乃可以管窺耳此所以窮古今之智巧不能盡其變歟今之談曆者或得其算而無測驗之具卽有其具而置非其地高下迥絕則亦無準宜非墨守者之所能自信也卽如世子言以大統與授時二曆相較考古則氣差三日推今則時差九刻夫時差九刻在亥子之間則移一日在晦朔之交則移一月此可驗之於近也設移而前則生明在初二之昏矣設移而後則生明在初四之夕矣弦望亦宜
