body:
  text: 聖神在御重熙累洽我皇上繼天立極調元岀治其曆數之傳直追帝堯之統則治曆明時正今日之急務也乃自國初迄今二百餘年曆猶未正司天氏但知僅守元臣立成之法而一切諸應不隨時以考驗氣朔竝乖天人弗協而猶然用至元辛已爲元夫有一代之興必有一代之曆我朝制作越千古猶柰何以曆數大典而猶然以勝國爲元耶臣愚不肖蓄此於中久矣向欲陳獻恐有越爼之嫌未敢也乃今年適逢上命儒臣纂修正史夫史也者大經大法咸正罔缺者也然而莫重於曆亦莫難於曆乃今尚未聞有一人欲起而更正之者及今不正何爲信史及今不言豈非失時臣故自今年悉心詳驗之思以上獻也野有一芹尚思自獻况以曆數大典又當修史之會臣旣實見其非是則安敢不亟陳於君父之前伏願陛下俯納臣言勑下禮部議覆上請遴選海内之有眞知曆數如郭守敬其人者俾之竭心殫力因數察理探索隱鉤深致遠其於日月之消息氣朔之差應平立新故之分弧矢分合之變黃道白道之一而不一天首天星之齊以非齊一一測正之亡爽焉假以便宜遲以歲月然後改憲明時報之天子定昭代之曆元成
