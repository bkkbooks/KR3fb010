body:
  text: 萬曆日十四年十二月二十三日抄刑科給事中李應策一本乞勑亟定歲差以荅輿望事臣惟曆之關于時歲差之關于曆大矣該鄭世子載堉曾獻曆上壽蒙禮部覆准發欽天監磨對事聞乙未歲八九月中迄今無耗昨該河南按察司僉事邢雲路復請議正曆元詳議本年冬至雲路測未正一刻大統推甲正二刻實後天九刻本年閏八月日食雲路候初虧已正一刻食止七分大統推初虧已正三刻食將幾盡後天二刻其測候諸應參差較鄭世子所奏簡切便覽獨應時加減法尚未遽悉耳臣思國朝曆元聖祖嘗諭二説難憑但驗七政交會行度無差者爲是惟時以至元辛已揆之洪武甲子僅百四年所律以差法似不甚遠至正德嘉靖已退當三度餘奚俟今日哉春秋不食朔猶直書官失之今日食後天幾二刻冬至後天逾九刻計氣應應損九百餘分乃云弗失乎曆理微秒日月五星運轉交會咸取應于窺管測表歐陽修所謂事之最易差者雖古太初大衍諸書詎不深思玄解得羲和氏之曆象授時遺意然果以鍾律爲數無差則太初曆宜卽定于漢而後之爲三統四分者若何又果以蓍策爲術無差則大衍曆當亦卽定于唐而後之爲五紀貞元觀象者又若何蓋隂陽迭行隨動而移移而錯錯而乖違日陷不止則躔離之謬分至之忒積此爲窮謂
