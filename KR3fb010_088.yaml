body:
  text: 距萬曆辛巳歲一千五年日食七分九十六秒日未出已食一分六十一秒日已出見食六分三十五秒初虧寅正一刻西北食甚卯初二刻正北復圓卯正三刻東北食甚日躔黃道柳二度六十六分赤道柳二度八十二分依舊法算距至元辛巳歲七百五年日食八分日未出已食六分七十三秒日已出見食一分二十七秒初虧寅正二刻正西食甚卯初二刻復圓卯正三刻正東食甚日躔黃道柳二度十九分赤道柳二度三十二分謹按此條曆家所謂帶食者也舊以應見者爲不見應不見者爲見與新法不同知曆者當辨孰爲近是已上往古日月食共十條距今甲午歲千餘年矣自甲午已後未來日月食共十條開列干後萬曆二十四年丙申歲三月壬午夜望月食依新法算距嘉靖甲寅歲四十二年
