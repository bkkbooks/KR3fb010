body:
  text: 萬曆三十二年甲辰歲四月辛巳朔日食依新法算距嘉靖甲寅歲五十年距萬曆辛巳歲二十三年日食三分九十秒初虧未正三刻西南食甚申正初刻正南復圓酉初初刻東南食甚日躔黃道胃一度五十五分赤道胃一度五十二分依舊法算距至元辛巳歲三百二十三年日食四分二十二秒初虧申初三刻西南食甚酉初初刻正南復圓酉正一刻東南食甚日躔黃道胃一度四十八分赤道胃一度四十五分謹按日月食舊例惟推黃道度今附赤道度於下蓋欲學者兼通黃赤道相求術庶不致失傳也右古今日月食共二十條秪依元史舊法與臣新法相校而錄其同異焉若夫大統曆經全文實愚臣所未覩雖頗聞其略節然莫知其詳也伏望欽依令該監推考而辨定疏密爲後來修曆者張本臣下情不勝榮幸仰荷之至萬年曆備考卷之三
