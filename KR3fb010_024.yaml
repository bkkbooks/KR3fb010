body:
  text: 辛卯與開禧曆合庚午曆元太祖時耶律楚材造命日起壬戌距元太祖十五年庚辰歲至萬曆二十二年甲午歲三百七十四年以其法推元太祖十五年天正冬至得己亥及推萬曆二十二年天正冬至得庚辰後天一日以新法上考元太祖十五年天正冬至得己亥與庚午曆合按元太祖以宋寧宗開禧二年丙寅歲即位其十五年歲次庚辰乃宋寧宗嘉定十三年庚辰歲也元太宗在位通無庚辰年元志以為太宗誤矣淳祐曆宋理宗時李德卿造距淳祐十年庚戌歲至萬曆二十二年甲午歲三百四十四年以其法推淳祐十年天正冬至得丙子及推萬曆二十二年天正冬至得庚辰後天一日以新法上考淳祐十年天正冬至得丙子與淳祐曆合會天曆宋理宗時談玉造距寶祐元年癸丑歲至萬曆二十二年甲午歲三百四十一年以其法推寶祐元年天正冬至得壬辰及推萬曆二十二年天正冬至得庚辰後天一日以新法上考寶祐元年天正冬至得壬辰與會天曆合成天曆宋度宗時陳鼎造距咸淳七年辛未歲至萬曆二十二年甲午歲三百二十三年以其法推咸淳七年天正冬至得丙寅及推萬曆二十二年天正冬至得庚辰後天一日以新法上考咸淳七年天正冬至得丙寅與成天曆合
