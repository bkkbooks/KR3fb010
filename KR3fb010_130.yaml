body:
  text: 移九刻于亥子之間則差一日懼後不啻焉前華湘奏堯時初昏昴中日行北陸躔于子屬虛七度今冬至初昏室中日行東陸躔于寅屬箕三度以相距四千年而隔餘五十度驗曆數愆期顧有言此日至之周遍于東西南運度豈泥若分秒而量積二萬七千餘年復歸如初又天行舒移而漸西每日過一度者為天道左旋之常日行縮移而漸西每積歲亦過行一度者為天道右轉之祕茲直存而不論耶人人知歲差易徴考之退度若以五十年若百年若六十六年或八十三年殊無一經久確論故由春秋歷宋末元初愈稽愈失計無慮數十更矣夫亦何術何數無錯大統曆本之勝國郭大史守敢以彼減二十四分二十五秒于周歲加二十五分七十五秒于周天窺度精到有陋太初大衍等為不足言者然積六十六年有奇而退一度則推驗之始已知有差何不即酌定畫一俟其退一度逾六十六年而後更茲其故難于言矣無猶釐毫之除加之周天者微多減之周歲者微少纖悉難究姑置此為盈虛之驗而探賾索隱不能不隨時以待歟雲路持觀象測景候時籌策四事議諸應宜俱改想已洞燭款竅使得中祕星曆書一遍閲而校焉必自有得世子僅閲衍義補氣閏轉交四准分秒數字即悟大統曆大義並所獲律呂說冀正之臣嘗謂律本居隂以治陽曆實居陽以治隂自非兩本惟登臺候日晷應否折忽于秒周歲周天微為增減務期晦朔弦望昏旦夜半中星分秒不爽尺寸與聖祖原論元統李得芳同一軌焉務稱完制餘不必更也而本監奉查律例久稽未復此又專門之裔本業雖長理或未諳精
