body:
  text: 總跋附録四疏未人所撰夢溪筆談有云熙寧中豫領太史令衛朴造曆氣朔已正但五星未有候簿可驗前世修曆多只增損舊曆而已未曾實考天度其法須測驗每夜昏曉夜半月及五星所在度秒置簿録之滿五年其間剔去雲隂及晝見日數外可得三年實行然後以算術綴之古所謂綴術者此也是時司天曆官皆承世族隸名食祿本無知曆者惡朴之術過已羣沮之屢起大獄雖終不能搖朴而候簿至今不成奉元曆五星步術但增損舊曆正其甚謬處十得五六而已朴之曆術今古未有為羣曆人所沮不能盡其藝惜哉余讀至此喟然歎曰古人有云後之視今亦猶今之視昔觀臺官之參語則吾輩議曆者其罪不容誅矣惡之欲其死非大獄而何苟非部科率見論以繼持之不亦殆乎雖然抱忠之臣猶懷下和三獻之志終不能已蓋雖有時而屈或亦有時而伸道之不行也退其志可乎故録四疏全文示世之議曆者而感發懲創皆在其中矣
