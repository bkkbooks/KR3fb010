body:
  text: 鄭府長史司爲恭進曆書上祝萬壽敬陳愚見以仰裨盛典萬一事萬曆二十三年十月二十八日承奉河南等處承宣布政使司劄付承準禮部照會該鄭世子載堉奏前事劄仰本司官吏卽便具啟鄭世子知會卽將所著律曆融通等書副本作速差人解部轉發欽天監磨算施行等因奉此隨具本啟奉鄭世子令旨曆書原藁十卷今謄錄作二冊批差小旗劉梯解送仍候勑到日專差官奏謝爾司給批與他敬此敬遵抄出到司擬合呈送爲此今將前項緣由同曆書印封理合差人具呈伏乞照驗施行計呈送曆書副本一部全右呈禮部左長史謝廷訓萬曆二十三年十一月二十日右長史關志拯
  hash: sha256:19f00d1bdc8310fafb547973c3940e0e7fe7412e7c27d8f683e762a9dd05027a
