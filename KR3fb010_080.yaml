body:
  text: 依舊法算距至元辛巳歲一千六十年月食八分七十一秒初虧子初二刻三更二點正東食甚丑初一刻四更二點復圓寅初一刻五更二點正西食甚月離黃道室五度九十分赤道室五度七十五分宋文帝元嘉十三年十二月十六日甲夜月食盡在鬼四度以衝計之日當在牛六見宋書祖沖之曆議謹按甲夜或作中夜者誤甲夜一更也乙丙丁戊夜二三四五更也盡字疑衍今曆鬼無四度蓋據當時赤道度耳元志云列舍相距度數歷代所測不同非微有動移則前人所測或有未密正謂此也已下三條放此依新法算距嘉靖甲寅歲一千一百一十八年距萬曆辛巳歲一千一百四十五年月食八分七十三秒初虧申正三刻昏刻東北食甚酉正一刻一更二點正北復圓戌初三刻一更五點西北食甚月離黃道柳三度四十一分赤道柳三度六十二分依舊法算距至元辛巳歲八百四十五年月食八分七十三秒
