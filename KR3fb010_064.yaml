body:
  text: 本朝洪武十六年癸亥歲十一月己未日冬至見大學衍義補太初庚午七十五刻大衍庚申五刻紀元己未三十四刻授時己未二刻大統己未三刻新法己未二刻右太初後天十一日大衍後天一日餘與天合史官所記二至晷景凡六十條以太初等五曆及新法考之太初合者僅二後天五日至十一日者凡五十八大衍合者三十六先一日者六後一日者十七後二日者一紀元合者四十二先一日者十後一日者八授時合者四十八先一日者十後一日者二大統合者四十二先一日者三後一日者十三後三日者二新法合者比授時多一事其不合者比授時少一事夫以此觀之則太初最疏固無足取大衍紀元非見用者亦不必論其授時曆不合者十二而先者多至於十後者僅二蓋減分太多未得其宜也將來氣朔皆失之先矣大統曆不合者十八而先一日者僅三後一日者多至十三後三日者二蓋由歲餘一定而無加減故也夫後者多而先者少今雖未覺其失恐將來氣朔浸失之後矣新法不合者十一比授時爲少合者四十九視授時爲多蓋密於授時矣其不與天合者非不合也前人有云類其同則知其中辨其異則知其變先後相戾者不可得兼也若曲變其法以改先者則後者愈後以改後者則先者益先徒令合者皆不合矣今乃折取中數不執一偏則先後二者雖不盡合而其相去亦皆不遠凡相合者各得中平之率矣附錄二十條
