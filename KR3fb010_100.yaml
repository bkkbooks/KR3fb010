body:
  text: 初虧子初二刻三更一點正東食既子正三刻三更五點食甚丑初一刻四更二點生光丑正初刻四更四點復圓寅初一刻五更三點正西食甚月離黃道尾五度八十九分赤道尾六度二十五分依舊法算距至元辛巳歲三百二十一年月食十四分十秒初虧子正初刻三更三點正東食既丑初二刻四更三點食甚丑正一刻四更五點生光寅初初刻五更二點復圓寅正二刻曉刻正西食甚月離黃道尾五度八十三分赤道尾六度十九分萬曆三十年壬寅歲十月甲辰夜望月食依新法算距嘉靖甲寅歲四十八年距萬曆辛巳歲二十一年月食十三分二十九秒月未出已食十分三十四秒月已出見食二分九十五秒初虧申初一刻在晝正東食既申正二刻在晝
