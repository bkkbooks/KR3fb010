body:
  text: 之士何嘗禁人習學曆法乎如欲執私習之條而絶星曆之學誤矣該監各官局守成算既不能測驗以窮其變又不能虛心博訪考訂以復其常今既有其人務在同心共事協力推驗不得妬功忌能自相矛盾悉聽本部參究恭候命下容臣等遵奉施行緣係議正曆元以成大典等及節奉欽依禮部看了來說禮部知道事理未敢擅便謹題請旨留中
