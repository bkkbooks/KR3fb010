body:
  text: 大統丁丑八十五刻新法丁丑四十二刻右太初後天六日餘與天合建德六年丁酉歲十一月二十三日壬辰景長見隋志太初己亥二十五刻大衍癸巳五刻紀元壬辰九十九刻授時癸巳九刻大統癸巳五十八刻新法癸巳十五刻右太初後天七日紀元與天合餘皆後天一日唐志大衍曆議云建德六年以壬辰景長而麟德開元曆皆得癸巳開皇七年以癸未景短而麟德開元曆皆得壬午先後相戻不可叶也皆日行盈縮使然凡曆術在於常數而不在於變行既叶中行之率則可以兩齊先後之變矣宣政元年戊戌歲十一月初五日戊戌景長見隋志太初甲辰五十刻大衍戊戌三十刻紀元戊戌二十三刻授時戊戌三十三刻大統戊戌八十二刻新法戊戌三十九刻右太初後天六日餘與天合隋開皇四年甲辰歲十一月十一日己巳景長見隋志太初丙子空刻大衍己巳七十七刻紀元己巳六十九刻授時己巳八十六刻大統庚午二十八刻新法己巳八十五刻右太初後天七日大統後天一日餘與天合開皇五年乙巳歲十一月二十二日乙亥景長見隋志太初辛巳二十五刻大衍乙亥一刻紀元甲戌九十三刻授時乙亥十刻
