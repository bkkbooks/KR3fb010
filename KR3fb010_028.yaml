body:
  text: 一自萬曆二十二年甲午已後六十年中間春秋二分冬夏二至大統曆與新法不同者凡二十四條新法皆在大統前一日大統皆在新法後一日夫二至二分乃四郊大祀之期大統曆法或誤故不可不辨也撮其略列于此冬至庚戌年戊申己酉甲寅年己巳庚午戊午年庚寅辛卯癸未年辛丑壬寅丁亥年壬戌癸亥辛卯年癸未甲申夏至丙申年壬辰癸巳庚子年癸丑甲寅甲辰年甲戌乙亥乙丑年甲子乙丑己巳年乙酉丙戌癸酉年丙午丁未春分丁酉年丙寅丁卯戊午年丙辰丁巳壬戌年丁丑戊寅丙寅年戊戌己亥庚午年己未庚申辛卯年己酉庚戌秋分癸卯年庚子辛丑丁未年辛酉壬戌辛亥年壬午癸未丙子年癸巳甲午庚辰年甲寅乙卯甲申年乙亥丙子右二分辨之稍難推二至憑晷景以驗之則真僞最易辨而曆法疏密可決矣一凡曆法之疏密當以天為驗證是乃曆之本也何謂天之驗證自古以來景長之極為真冬至長之不極雖名冬至實非真冬至也景短之極為真夏至短之不極雖名夏至實非真夏至也且如萬曆二十四年五月夏至六統曆推得癸巳而新法推得壬辰此夏至之不相同也萬曆三十八年十一月冬至大統曆推得己酉而新法推得戊申此冬至之不相同也夫癸巳壬辰己酉戊申此四日無題勒款識孰知其真否可與衆共辨者惟晷景是證耳若萬曆二十四年夏至之日其景不短而前一日之景卻短萬曆三十八年冬至之日其景不長而前一日之景卻長則知
