body:
  text: 朔差四辰此疏密之大較也僖公五年周曆漢曆唐曆皆以辛亥南至後五百五十餘歲至太初元年周曆漢曆皆得甲子夜半冬至唐曆皆以辛酉則漢曆後天三日矣祖沖之張胄玄促上章歲至太初元年沖之以癸亥雞鳴冬至而胄玄以癸亥日出欲令合於甲子而適與魯曆相會自此推僖公五年魯曆以庚戌冬至而二家皆以甲寅且僖公登觀臺以望而書雲物出於表晷天驗非時史億度乖丘明正時之意以就劉歆之失今考麟德元年冬至唐曆皆以甲子而周曆漢曆皆以庚午然則自太初下至麟德差四日自太初上及僖公差三日不足疑也四分曆漢章帝時編欣等造靈帝時重修距熹平三年甲寅歲至萬曆二十二年甲午歲千四百二十年以其法推熹平三年天正冬至得丁丑及推萬曆十二年天正冬至得壬辰後天十三日劉宋粗沖之以明曆上考熹平三年天正冬至當在乙亥謂四分曆所推非是唐行以大衍曆上考得甲戌今以新法上考亦得甲戌與大衍同宋志祖沖之議曰後漢書説四分曆法雖分章設蔀創自元和而晷儀衆數定於熹平三年四分曆立冬中景長一丈立春中景九尺六寸尋冬至南極日晷最長二氣去至日數既同則中景應等而前長後短頓差四寸此曆置冬至後天之驗也二氣中景日差九分半弱進退均調略無盈縮以率計之二氣各退二日十二刻則晷景之數立冬更短立春更長並差二寸二氣中景俱長九尺八寸矣即立冬立春之正日也以此推之曆置冬至後天亦二日十二刻也熹平三年時
