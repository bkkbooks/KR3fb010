body:
  text: 食甚日躔黃道角九度八十五分赤道角九度七分謹按曆經云若當時有宿度仍依當時曆法命之依三統曆冬至日在牽牛加而命之則與亢二度合漢明帝永平四年八月丙寅時加未日有食之見後漢五行志註謹按此不言朔者八月之晦也時加未者猶言加時在未依新法算距嘉靖甲寅歲一千四百九十三年距萬曆辛巳歲一千五百二十年日食二分七十一秒初虧未初二刻西北食甚未正二刻正北復圓申初二刻東北食甚日躔黃道亢初度十二分赤道亢初度十一分依舊法算距至元辛巳歲一千二百二十年日食三分五十六秒初虧未正二刻西北食甚申初三刻正北復圓申正三刻東北食甚日躔黃道角十一度六十九分赤道角十度七十七分魏文帝黃初二年六月二十七日戊辰加時未日食見晉書曆志依新法算距嘉靖甲寅歲一千三百三十三年距萬曆辛巳歲一千三百六十年
