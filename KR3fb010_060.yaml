body:
  text: 紀元乙亥四十九刻授時乙亥三十八刻大統乙亥三十八刻新法乙亥三十八刻右太初後天十一日大衍後天二日餘皆後天一日嘉定五年壬申歲十一月壬戌日南至見元志太初癸酉空刻大衍癸亥二十五刻紀元壬戌六十八刻授時壬戌五十七刻大統壬戌五十七刻新法壬戌五十六刻右太初後天十一日大衍後天一日餘與天合紹定三年庚寅歲十一月丙申日南至見元志太初丁未五十刻大衍丁酉六十五刻紀元丁酉七刻授時丙申九十三刻大統丙申九十三刻新法丙申九十三刻右太初後天十一日大衍紀元後天一日餘與天合淳祐十年庚戌歲十一月辛巳日南至見元志太初壬辰五十刻大衍壬午五十四刻紀元辛巳九十四刻授時辛巳七十八刻大統辛巳七十八刻新法辛巳七十八刻右太初後天十一日大衍後天一日餘與天合元至元十四年丁丑歲十一月癸卯日辰初三刻冬至見元志太初甲寅二十五刻大衍甲辰十四刻紀元癸卯五十二刻授時癸卯三十三刻大統癸卯三十三刻新法癸卯三十三刻右太初後天十一日大衍後天一日餘與天合至元十五年戊寅歲五月乙巳日亥正三刻夏至見元志
