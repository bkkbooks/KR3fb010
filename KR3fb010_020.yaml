body:
  text: 以其法推崇寧二年天正冬至得乙酉及推萬曆二十二年天正冬至得庚辰後天一日以新法上考崇寧二年天正冬至得乙酉與占天曆合紀元曆宋徽宗時姚舜輔重造命日起己卯距崇寧五年丙戌歲至萬曆二十二年甲午歲四百八十八年以其法推崇寧五年天正冬至得辛丑及推萬曆二十二年天正冬至得庚辰後天一日以新法上考崇寧五年天正冬至得辛丑與紀元曆合大明曆金熙宗時楊級造距天會五年丁未歲至萬曆二十二年甲午歲四百六十七年以其法推天會五年天正冬至得辛卯及推萬曆二十二年天正冬至得庚辰後天一日以新法上考天會五年天正冬至得辛卯與大明曆合統元曆宋高宗時陳得一造距紹興五年乙卯歲至萬曆二十二年甲午歲四百五十九年以其法推紹興五年天正冬至得癸酉及推萬曆二十二年天正冬至得庚辰後天一日以新法上考紹興五年天正冬至得癸酉與統元曆合乾道曆宋孝宗時劉孝榮造距乾道三年丁亥歲至萬曆二十二年甲午歲四百二十七年以其法推乾道三年天正冬至得辛酉及推萬曆二十二年天正冬至得庚辰後天一日以新法上考乾道三年天正冬至得辛酉與乾道曆合淳熙曆宋孝宗時劉孝榮重造
