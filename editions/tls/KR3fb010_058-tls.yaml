body:
  text: 大統丙申三十八刻新法丙申三十五刻右太初後天十日餘與天合崇寧四年乙酉歲十一月辛丑冬至見元志太初辛亥二十五刻大衍壬寅十刻紀元辛丑六十二刻授時辛丑六十刻大統辛丑六十二刻新法辛丑五十九刻右太初後天十日大衍後天一日餘與天合紹熙二年辛亥歲十一月壬申冬至見元志太初壬午七十五刻大衍癸酉十二刻紀元壬申五十七刻授時壬申四十七刻大統壬申四十七刻新法壬申四十七刻右太初後天十日大衍後天一日餘與天合紹熙四年癸丑歲十一月十九日壬午景長見宋志太初癸巳二十五刻大衍癸未六十一刻紀元癸未六刻授時壬午九十六刻大統壬午九十六刻新法壬午九十五刻右太初後天十一日大衍紀元後天一日餘與天合慶元三年丁巳歲十一月癸卯日南至見元志太初甲寅二十五刻大衍甲辰五十九刻紀元甲辰三刻授時癸卯九十三刻大統癸卯九十三刻新法癸卯九十二刻右太初後天十一日大衍紀元後天一日餘與天合嘉泰三年癸亥歲十一月甲戌日南至見元志太初乙酉七十五刻大衍丙子五刻
