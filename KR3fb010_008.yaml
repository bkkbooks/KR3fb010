body:
  text: 按自前漢太初已後至於劉宋元嘉已前諸曆所置冬至率皆後天三日蓋由踵三統之訛承四分之謬不過為合以驗天非順天以求合故也一行所謂有效於古宜合於今此乃前人定論今以諸曆下推近歲冬至差多者至十三四日少亦不下七八日其當時亦未必與天合可知也自何承天造元嘉曆測驗之後迄於授時則轉為精密矣是故新法上考多與之合間有不合者其說放此云元嘉曆前宋文帝時何承天造距元嘉二十年癸未歲至萬曆二十二年甲午歲千一百五十一年以其法推元嘉二十年天正冬至得乙巳及推萬曆二十二年天正冬至得甲申後天五日以新法上考元嘉二十年天正冬至得乙巳與元嘉曆合大明曆前宋孝武帝時祖沖之造距大明七年癸卯歲至萬曆二十二年甲午歲千一百三十一年以其法推大明七年天正冬至得庚寅及推萬曆二十二年天正冬至得庚辰後天一日以新法上考大明七年天正冬至得庚寅與大明曆合正光曆後魏孝明帝時李業興等造距正光三年壬寅歲至萬曆二十二年甲午歲千七十二年以其法推正光三年天正冬至得己亥及推萬曆二十二年天正冬至得庚辰後天一日以新法上考正光三年天正冬至得己亥與正光曆合興和曆後魏孝靜帝時李業興等重造距興和二年庚申歲至萬曆二十二年甲午歲千五十四年以
