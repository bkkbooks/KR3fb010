body:
  text: 鄭世子臣載堉謹撰二至晷景考説者皆云漢曆有四太初最密唐曆有八大衍最密宋曆十六紀元最密元曆有二授時最密今大統曆與回回曆相校大統最密然新率與之校所得尤多視太初等曆大不侔矣自魯僖公五年丙寅歲正月至洪武十六年癸亥歲十一月二千三十八年之間傳志所載二至晷景凡六十事用前代所謂密者四曆及大統曆并新法考之所得開列于後魯僖公五年丙寅歲春王正月辛亥朔日南至見春秋左傳漢太初曆辛亥二十五刻唐大衍曆辛亥九十四刻宋紀元曆壬子八十四刻元授時曆辛亥十四刻本朝大統曆甲寅八十二刻新法推得辛亥五十五刻右紀元後天一日大統後天三日餘與天合昭公二十年己卯歲春王二月己丑日南至見春秋左傳太初己丑五十刻大衍己丑四十五刻紀元庚寅二十五刻授時戊子八十三刻大統壬辰七刻新法己丑二十三刻右紀元後天一日授時先天一日大統後天三日餘與天合按南至晷景見於經傳者惟此二條而已餘或見於讖緯等書若春秋命曆序之類即漢志隋志所引者今未敢以為據授時曆議據前漢志魯獻公十五年戊寅歲正月甲寅朔旦冬至引用此條為首蓋獻公乃隱公五世祖其十五年戊寅歲下距隱公元年己未歲百六十一年其非春秋時明矣而
