body:
  text: 與崇玄曆合欽天曆後周世宗時王朴造距顯德三年丙辰歲至萬曆二十二年甲午歲六百三十八年以其法推顯德三年天正冬至得乙未及推萬曆二十二年天正冬至得辛巳後天二日以新法上考顯德三年天正冬至得乙未與欽天曆合應天曆宋太祖時王處訥等造距建隆三年壬戌歲至萬曆二十二年甲午歲六百三十二年以其法推建隆三年天正冬至得丙寅及推萬曆二十二年天正冬至得辛巳後天二日以新法上考建隆三年天正冬至得丙寅與應天曆合乾元曆宋太宗時吳昭素等造距太平興國六年辛巳歲至萬曆二十二年甲午歲六百一十三年以其法推太平興國六年天正冬至得丙午及推萬曆二十二年天正冬至得辛巳後天二日以新法上考太平興國六年天正冬至得丙午與乾元曆合儀天曆宋真宗時史序等造距咸平四年辛丑歲至萬曆二十二年甲午歲五百九十三年以其法推咸平四年天正冬至得辛卯及推萬曆二十二年天正冬至得辛巳後天二日以新法上考咸平四年天正冬至得辛卯與儀天曆合乾興曆宋真宗時張奎造命日起丁卯距乾興元年壬戌歲至萬曆二十二年甲午歲五百七十二年以其法推乾興元年天正冬至得辛巳及推萬曆二十二年天
