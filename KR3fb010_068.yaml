body:
  text: 六十一年癸酉歲五月夏至大統丁未四刻新法丙午九十三刻授時丙午九十三刻六十五年丁丑歲五月夏至大統戊辰一刻新法丁卯八十九刻授時丁卯九十刻七十一年癸未歲十一月冬至大統壬寅八刻新法辛丑九十七刻授時辛丑九十七刻七十五年丁亥歲十一月冬至大統癸亥五刻新法壬戌九十三刻授時壬戌九十四刻七十九年辛卯歲十一月冬至大統甲申二刻新法癸未九十刻授時癸未九十一刻八十六年戊戌歲五月夏至大統戊午十刻新法丁巳九十七刻授時丁巳九十九刻九十年壬寅歲五月夏至大統己卯七刻新法戊寅九十四刻授時戊寅九十五刻九十四年丙午歲五月夏至大統庚子四刻新法己亥九十一刻授時己亥九十二刻
